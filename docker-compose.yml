# =============================================================
#  docker-compose.yml — VulnShop Containerised Stack
#
#  Runs the full VulnShop app without needing XAMPP.
#  Used by the GitHub Actions workflow and for local Docker testing.
#
#  Usage:
#    docker-compose up -d        # start in background
#    docker-compose down         # stop and remove containers
#    docker-compose logs -f app  # follow application logs
#
#  VulnShop will be available at: http://localhost:8080
# =============================================================

version: '3.9'

services:

  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""         # No root password (mirrors XAMPP default)
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: vulnshop
    volumes:
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vulnshop-net

  # ── PHP + Apache Application ───────────────────────────────
  app:
    image: php:8.2-apache
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/VulnShop:ro
    working_dir: /var/www/html/VulnShop
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
        docker-php-ext-install mysqli &&
        apache2-foreground
      "
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1/VulnShop/index.php') === false ? 1 : 0);"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulnshop-net

volumes:
  db_data:

networks:
  vulnshop-net:
    driver: bridge
